<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ config.extra.even_title }}</title>
</head>
<body>
<div id="header">
  <div class="menu">
    <ul>
      {% for item in config.extra.even_menu %}
      <li><a href="{{ item.url }}">{{ item.name }}</a></li>
      {% endfor %}
    </ul>
  </div>
</div>
<main>
  <h1>{{ config.extra.even_title }}</h1>
  <div class="posts">
    {% for page in paginator.pages %}
    <article class="post">
      <h2 class="post__title"><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
      <div class="post__meta">
        {% if page.date %}<time>{{ page.date }}</time>{% endif %}
      </div>
    </article>
    {% endfor %}
  </div>
</main>
<footer>
  <p>共 {{ paginator.pages | length }} 个仓库 &middot; Powered by gitblog</p>
</footer>
</body>
</html>
