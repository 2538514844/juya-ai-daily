<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title }} - {{ config.extra.even_title }}</title>
</head>
<body>
<div id="header">
  <div class="menu">
    <ul>
      {% for item in config.extra.even_menu %}
      <li><a href="{{ item.url }}">{{ item.name }}</a></li>
      {% endfor %}
    </ul>
  </div>
</div>
<main>
  <article class="post">
    <h1 class="post__title">{{ page.title }}</h1>
    <div class="post__meta">
      <time>{{ page.date }}</time>
    </div>
    <div class="post-content">
      {{ page.content | safe }}
    </div>
  </article>
</main>
<footer>
  <p>Powered by gitblog</p>
</footer>
</body>
</html>
